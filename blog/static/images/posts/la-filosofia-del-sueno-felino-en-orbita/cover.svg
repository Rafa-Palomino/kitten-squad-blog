<svg xmlns="http://www.w3.org/2000/svg" width="1792" height="1024" viewBox="0 0 1792 1024">
  <defs>
    <!-- Deep space gradient -->
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="50%" stop-color="#060618"/>
      <stop offset="100%" stop-color="#020209"/>
    </radialGradient>
    <!-- Nebula glow -->
    <radialGradient id="nebula1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7b2d8b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7b2d8b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#1a4fa0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a4fa0" stop-opacity="0"/>
    </radialGradient>
    <!-- Planet glow -->
    <radialGradient id="planetGrad" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="40%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d1b6e"/>
    </radialGradient>
    <!-- Cat body gradient -->
    <radialGradient id="catGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#e8a87c"/>
      <stop offset="100%" stop-color="#c07840"/>
    </radialGradient>
    <!-- Moon glow -->
    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Star twinkle filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow for cat -->
    <filter id="catGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1792" height="1024" fill="url(#spaceGrad)"/>
  <rect width="1792" height="1024" fill="url(#nebula1)"/>
  <rect width="1792" height="1024" fill="url(#nebula2)"/>

  <!-- Stars - layer 1 (small, dim) -->
  <g opacity="0.6">
    <circle cx="45" cy="80" r="1" fill="#fff"/><circle cx="120" cy="35" r="1.2" fill="#fff"/>
    <circle cx="200" cy="120" r="0.8" fill="#fff"/><circle cx="310" cy="55" r="1" fill="#fff"/>
    <circle cx="420" cy="90" r="1.3" fill="#fff"/><circle cx="550" cy="30" r="0.9" fill="#fff"/>
    <circle cx="650" cy="110" r="1.1" fill="#fff"/><circle cx="750" cy="45" r="0.8" fill="#fff"/>
    <circle cx="870" cy="70" r="1.2" fill="#fff"/><circle cx="980" cy="25" r="1" fill="#fff"/>
    <circle cx="1080" cy="90" r="0.9" fill="#fff"/><circle cx="1190" cy="50" r="1.1" fill="#fff"/>
    <circle cx="1300" cy="100" r="1" fill="#fff"/><circle cx="1420" cy="35" r="1.3" fill="#fff"/>
    <circle cx="1530" cy="85" r="0.8" fill="#fff"/><circle cx="1650" cy="55" r="1" fill="#fff"/>
    <circle cx="1750" cy="110" r="1.2" fill="#fff"/>
    <circle cx="80" cy="200" r="0.9" fill="#fff"/><circle cx="160" cy="280" r="1" fill="#fff"/>
    <circle cx="280" cy="230" r="1.1" fill="#fff"/><circle cx="370" cy="300" r="0.8" fill="#fff"/>
    <circle cx="480" cy="190" r="1.2" fill="#fff"/><circle cx="580" cy="260" r="1" fill="#fff"/>
    <circle cx="700" cy="210" r="0.9" fill="#fff"/><circle cx="820" cy="290" r="1.1" fill="#fff"/>
    <circle cx="940" cy="180" r="1" fill="#fff"/><circle cx="1050" cy="250" r="1.3" fill="#fff"/>
    <circle cx="1160" cy="200" r="0.8" fill="#fff"/><circle cx="1270" cy="270" r="1" fill="#fff"/>
    <circle cx="1380" cy="220" r="1.2" fill="#fff"/><circle cx="1490" cy="290" r="0.9" fill="#fff"/>
    <circle cx="1600" cy="180" r="1.1" fill="#fff"/><circle cx="1710" cy="250" r="1" fill="#fff"/>
    <circle cx="30" cy="400" r="1" fill="#fff"/><circle cx="140" cy="450" r="1.2" fill="#fff"/>
    <circle cx="250" cy="380" r="0.8" fill="#fff"/><circle cx="360" cy="470" r="1" fill="#fff"/>
    <circle cx="490" cy="410" r="1.1" fill="#fff"/><circle cx="600" cy="390" r="0.9" fill="#fff"/>
    <circle cx="720" cy="460" r="1.3" fill="#fff"/><circle cx="850" cy="400" r="1" fill="#fff"/>
    <circle cx="1100" cy="440" r="1" fill="#fff"/><circle cx="1210" cy="380" r="1.2" fill="#fff"/>
    <circle cx="1330" cy="450" r="0.8" fill="#fff"/><circle cx="1450" cy="410" r="1.1" fill="#fff"/>
    <circle cx="1560" cy="390" r="1" fill="#fff"/><circle cx="1680" cy="460" r="0.9" fill="#fff"/>
    <circle cx="1760" cy="420" r="1.2" fill="#fff"/>
    <circle cx="70" cy="600" r="1" fill="#fff"/><circle cx="190" cy="660" r="0.9" fill="#fff"/>
    <circle cx="320" cy="580" r="1.1" fill="#fff"/><circle cx="440" cy="650" r="1" fill="#fff"/>
    <circle cx="570" cy="610" r="1.2" fill="#fff"/><circle cx="680" cy="570" r="0.8" fill="#fff"/>
    <circle cx="1020" cy="640" r="1" fill="#fff"/><circle cx="1140" cy="590" r="1.1" fill="#fff"/>
    <circle cx="1260" cy="660" r="0.9" fill="#fff"/><circle cx="1380" cy="600" r="1.2" fill="#fff"/>
    <circle cx="1500" cy="640" r="1" fill="#fff"/><circle cx="1620" cy="580" r="1.1" fill="#fff"/>
    <circle cx="1740" cy="630" r="0.8" fill="#fff"/>
    <circle cx="50" cy="800" r="1.1" fill="#fff"/><circle cx="170" cy="860" r="1" fill="#fff"/>
    <circle cx="290" cy="790" r="0.9" fill="#fff"/><circle cx="410" cy="850" r="1.2" fill="#fff"/>
    <circle cx="540" cy="810" r="1" fill="#fff"/><circle cx="670" cy="870" r="0.8" fill="#fff"/>
    <circle cx="1070" cy="830" r="1.1" fill="#fff"/><circle cx="1200" cy="790" r="1" fill="#fff"/>
    <circle cx="1320" cy="860" r="0.9" fill="#fff"/><circle cx="1440" cy="810" r="1.2" fill="#fff"/>
    <circle cx="1570" cy="870" r="1" fill="#fff"/><circle cx="1690" cy="820" r="1.1" fill="#fff"/>
    <circle cx="1760" cy="880" r="0.8" fill="#fff"/>
    <circle cx="100" cy="950" r="1" fill="#fff"/><circle cx="230" cy="990" r="1.2" fill="#fff"/>
    <circle cx="360" cy="940" r="0.9" fill="#fff"/><circle cx="490" cy="970" r="1.1" fill="#fff"/>
    <circle cx="620" cy="955" r="1" fill="#fff"/><circle cx="750" cy="985" r="0.8" fill="#fff"/>
    <circle cx="1100" cy="960" r="1.2" fill="#fff"/><circle cx="1230" cy="940" r="1" fill="#fff"/>
    <circle cx="1360" cy="980" r="0.9" fill="#fff"/><circle cx="1490" cy="950" r="1.1" fill="#fff"/>
    <circle cx="1620" cy="990" r="1" fill="#fff"/><circle cx="1740" cy="960" r="1.2" fill="#fff"/>
  </g>

  <!-- Twinkling bright stars -->
  <g filter="url(#starGlow)">
    <circle cx="155" cy="148" r="2.5" fill="#fffde7">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="430" cy="72" r="2" fill="#e3f2fd">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="310" r="2.8" fill="#fffde7">
      <animate attributeName="opacity" values="1;0.2;1" dur="4.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1380" cy="140" r="2.2" fill="#f3e5f5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1600" cy="300" r="2.5" fill="#e8f5e9">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1720" cy="180" r="2" fill="#fffde7">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="520" r="2.3" fill="#e3f2fd">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1650" cy="700" r="2.1" fill="#fffde7">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="4.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Earth (planet in background, lower left) -->
  <g transform="translate(220, 700)">
    <circle cx="0" cy="0" r="160" fill="url(#planetGrad)" filter="url(#moonGlow)"/>
    <!-- Cloud bands -->
    <ellipse cx="-20" cy="-80" rx="90" ry="18" fill="white" opacity="0.15" transform="rotate(-15)"/>
    <ellipse cx="30" cy="-20" rx="100" ry="15" fill="white" opacity="0.1" transform="rotate(-10)"/>
    <ellipse cx="-10" cy="60" rx="80" ry="12" fill="white" opacity="0.12" transform="rotate(-5)"/>
    <!-- Landmass suggestion -->
    <ellipse cx="20" cy="-40" rx="45" ry="55" fill="#2e7d32" opacity="0.4" transform="rotate(20)"/>
    <ellipse cx="-50" cy="40" rx="35" ry="40" fill="#388e3c" opacity="0.3" transform="rotate(-15)"/>
    <!-- Atmosphere rim -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="#4fc3f7" stroke-width="3" opacity="0.4"/>
    <circle cx="0" cy="0" r="170" fill="none" stroke="#1976d2" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Orbital ring around Earth -->
  <g transform="translate(220, 700)">
    <ellipse cx="0" cy="0" rx="250" ry="55" fill="none" stroke="#90caf9" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.3">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Constellation lines (philosophical, Ursa Minor-like) -->
  <g stroke="#9fa8da" stroke-width="0.8" opacity="0.3">
    <line x1="1350" y1="200" x2="1420" y2="240"/>
    <line x1="1420" y1="240" x2="1500" y2="210"/>
    <line x1="1500" y1="210" x2="1570" y2="250"/>
    <line x1="1570" y1="250" x2="1640" y2="220"/>
    <line x1="1350" y1="200" x2="1290" y2="240"/>
    <line x1="1290" y1="240" x2="1310" y2="310"/>
  </g>
  <!-- Constellation dots -->
  <g fill="#9fa8da" opacity="0.7">
    <circle cx="1350" cy="200" r="2.5"/><circle cx="1420" cy="240" r="2"/>
    <circle cx="1500" cy="210" r="3"/><circle cx="1570" cy="250" r="2"/>
    <circle cx="1640" cy="220" r="2.5"/><circle cx="1290" cy="240" r="2"/>
    <circle cx="1310" cy="310" r="2"/>
  </g>

  <!-- Shooting star -->
  <g>
    <line x1="1200" y1="150" x2="1350" y2="100" stroke="white" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="6s" begin="2s" repeatCount="indefinite"/>
    </line>
    <circle cx="1200" cy="150" r="2" fill="white" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="6s" begin="2s" repeatCount="indefinite"/>
      <animateMotion path="M0,0 L150,-50" dur="0.4s" begin="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- CAT - sleeping in orbital float, center-right area -->
  <g transform="translate(960, 400)" filter="url(#catGlow)">
    <!-- Tail curving around -->
    <path d="M 120,80 Q 180,120 170,60 Q 160,0 110,20" fill="none" stroke="#c07840" stroke-width="18" stroke-linecap="round"/>
    <path d="M 120,80 Q 180,120 170,60 Q 160,0 110,20" fill="none" stroke="#e8a87c" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Body (curled up oval) -->
    <ellipse cx="0" cy="60" rx="140" ry="100" fill="#c07840" transform="rotate(-8)"/>
    <ellipse cx="0" cy="60" rx="125" ry="88" fill="#e8a87c" transform="rotate(-8)"/>
    <!-- Belly lighter patch -->
    <ellipse cx="-10" cy="75" rx="70" ry="55" fill="#f5c99c" opacity="0.6" transform="rotate(-5)"/>
    
    <!-- Head -->
    <circle cx="-90" cy="-20" r="72" fill="#c07840"/>
    <circle cx="-90" cy="-20" r="65" fill="#e8a87c"/>
    
    <!-- Ears -->
    <polygon points="-155,-75 -130,-30 -105,-70" fill="#c07840"/>
    <polygon points="-148,-68 -130,-38 -108,-65" fill="#e86a8a"/>
    <polygon points="-35,-80 -60,-35 -20,-65" fill="#c07840"/>
    <polygon points="-38,-73 -58,-40 -23,-62" fill="#e86a8a"/>
    
    <!-- Face - sleeping (eyes closed) -->
    <!-- Closed eyes - peaceful crescent shapes -->
    <path d="M -115,-25 Q -105,-35 -95,-25" fill="none" stroke="#7b4a1e" stroke-width="4" stroke-linecap="round"/>
    <path d="M -80,-25 Q -70,-35 -60,-25" fill="none" stroke="#7b4a1e" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Nose -->
    <ellipse cx="-88" cy="-5" rx="8" ry="5" fill="#e86a8a"/>
    
    <!-- Whiskers -->
    <line x1="-88" y1="-3" x2="-155" y2="-18" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    <line x1="-88" y1="-3" x2="-158" y2="-2" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    <line x1="-88" y1="-3" x2="-155" y2="13" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    <line x1="-88" y1="-3" x2="-22" y2="-18" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    <line x1="-88" y1="-3" x2="-20" y2="-2" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    <line x1="-88" y1="-3" x2="-22" y2="13" stroke="#c8a882" stroke-width="1.5" opacity="0.8"/>
    
    <!-- Mouth - slight smile -->
    <path d="M -95,2 Q -88,10 -81,2" fill="none" stroke="#7b4a1e" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Paws tucked under -->
    <ellipse cx="60" cy="120" rx="35" ry="20" fill="#c07840" transform="rotate(10)"/>
    <ellipse cx="60" cy="120" rx="28" ry="15" fill="#e8a87c" transform="rotate(10)"/>
    <!-- Toe lines -->
    <line x1="45" y1="130" x2="42" y2="140" stroke="#a05e2c" stroke-width="2" stroke-linecap="round"/>
    <line x1="58" y1="133" x2="56" y2="143" stroke="#a05e2c" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="132" x2="69" y2="142" stroke="#a05e2c" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Gentle floating animation -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-12; 0,0" dur="5s" repeatCount="indefinite" additive="sum"/>
  </g>

  <!-- Dream bubbles floating up from cat -->
  <g opacity="0.7">
    <!-- Small bubble -->
    <circle cx="870" cy="340" r="12" fill="none" stroke="#9fa8da" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="340;280;220" dur="4s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="r" values="8;14;18" dur="4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <!-- Medium bubble -->
    <circle cx="855" cy="310" r="18" fill="none" stroke="#9fa8da" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="310;240;170" dur="4s" begin="1.3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="12;20;26" dur="4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
    <!-- Large dream cloud bubble with stars inside -->
    <circle cx="840" cy="280" r="50" fill="#1a1a4a" stroke="#9fa8da" stroke-width="1.5" opacity="0">
      <animate attributeName="opacity" values="0;0.75;0" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="280;190;100" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="30;55;70" dur="6s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <g opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="translate" values="840,280; 840,190; 840,100" dur="6s" begin="2.5s" repeatCount="indefinite"/>
      <circle cx="0" cy="0" r="2" fill="#fffde7"/>
      <circle cx="-12" cy="-10" r="1.5" fill="#fffde7"/>
      <circle cx="15" cy="-5" r="1.5" fill="#fffde7"/>
      <circle cx="-8" cy="15" r="1" fill="#fffde7"/>
    </g>
  </g>

  <!-- Milky Way band (subtle) -->
  <ellipse cx="896" cy="512" rx="900" ry="120" fill="none" stroke="white" stroke-width="80" opacity="0.025" transform="rotate(-30 896 512)"/>

  <!-- Title text area -->
  <g>
    <!-- Text background panel -->
    <rect x="480" y="730" width="830" height="240" rx="20" fill="#050510" fill-opacity="0.75"/>
    <rect x="480" y="730" width="830" height="240" rx="20" fill="none" stroke="#3d5a9e" stroke-width="1" opacity="0.5"/>

    <!-- Main title -->
    <text x="896" y="800" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="bold" fill="#e8eaf6" letter-spacing="1">
      La Filosofía del Sueño Felino
    </text>
    <!-- Subtitle -->
    <text x="896" y="852" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#9fa8da" letter-spacing="2">
      en Órbita
    </text>
    <!-- Decorative line -->
    <line x1="640" y1="870" x2="1152" y2="870" stroke="#3d5a9e" stroke-width="1" opacity="0.7"/>
    <!-- Author / tagline -->
    <text x="896" y="910" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#7986cb" font-style="italic">
      Whiskers · Kitten Squad Blog
    </text>
    <!-- Small moon emoji substitute - circle -->
    <text x="896" y="948" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#7986cb" opacity="0.8">🐾 · · · 🌌 · · · 🐾</text>
  </g>

  <!-- Small floating particles / stardust -->
  <g fill="white" opacity="0.5">
    <circle cx="1100" cy="200" r="1">
      <animate attributeName="cy" values="200;180;200" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="150" r="1">
      <animate attributeName="cy" values="150;130;150" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1450" cy="450" r="1.2">
      <animate attributeName="cy" values="450;430;450" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1550" cy="550" r="0.8">
      <animate attributeName="cy" values="550;535;550" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="500" r="1">
      <animate attributeName="cy" values="500;485;500" dur="6.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="6.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
